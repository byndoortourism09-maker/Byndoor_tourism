<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
  <meta name="theme-color" content="#0a7c6e"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-title" content="Byndoor"/>
  <meta name="description" content="Discover Byndoor — Hidden Gem of Coastal Karnataka"/>
  <link rel="manifest" href="manifest.json"/>
  <link rel="apple-touch-icon" href="icons/icon-192.png"/>
  <title>Discover Byndoor 🌊</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet"/>
  <style>
  :root{
    --p:#0a7c6e;--p2:#0d9e8d;--acc:#f97316;--gold:#fbbf24;
    --pink:#e11d7a;--sea:#0ea5e9;--sand:#fdf6ec;--dark:#0f172a;
    --muted:#64748b;--bdr:#e8e4de;--r:18px;--r2:12px;
    --g1:linear-gradient(135deg,#0a7c6e,#0ea5e9);
    --g2:linear-gradient(135deg,#f97316,#fbbf24);
    --g3:linear-gradient(135deg,#e11d7a,#f97316);
    --g4:linear-gradient(135deg,#7c3aed,#0ea5e9);
    --g5:linear-gradient(135deg,#0f172a,#1e40af);
    --g6:linear-gradient(135deg,#dc2626,#991b1b);
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{font-family:'DM Sans',sans-serif;background:var(--sand);color:var(--dark);max-width:430px;margin:0 auto;min-height:100vh;overflow-x:hidden}

  /* INSTALL BANNER */
  #install-banner{display:none;position:fixed;top:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:var(--dark);color:#fff;padding:10px 16px;z-index:999;align-items:center;gap:10px}
  #install-banner.show{display:flex}
  #install-banner p{flex:1;font-size:.78rem;font-weight:600}
  #ibtn{background:var(--acc);color:#fff;border:none;border-radius:20px;padding:5px 14px;font-size:.75rem;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif}
  #dbtn{background:none;border:none;color:#aaa;font-size:1.1rem;cursor:pointer}

  /* HERO */
  .hero-bg{background:linear-gradient(160deg,#064e3b 0%,#0a7c6e 40%,#0ea5e9 75%,#f97316 100%);padding:24px 18px 78px;position:relative;overflow:hidden}
  .hero-bg::before{content:'';position:absolute;inset:0;background:url("data:image/svg+xml,%3Csvg width='40' height='40' viewBox='0 0 40 40' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%23ffffff' fill-opacity='0.03'%3E%3Cpath d='M20 20c0-5.5-4.5-10-10-10S0 14.5 0 20s4.5 10 10 10 10-4.5 10-10zm10 0c0 5.5 4.5 10 10 10s10-4.5 10-10-4.5-10-10-10-10 4.5-10 10z'/%3E%3C/g%3E%3C/svg%3E")}
  .hero-bg::after{content:'';position:absolute;bottom:-1px;left:-5%;width:110%;height:55px;background:var(--sand);border-radius:55% 55% 0 0/100% 100% 0 0}
  .hero-orb{position:absolute;border-radius:50%;background:rgba(255,255,255,.07)}
  .orb1{width:200px;height:200px;top:-80px;right:-50px}
  .orb2{width:120px;height:120px;top:40px;right:20px}
  .orb3{width:80px;height:80px;bottom:60px;left:-20px}
  .hero-top{display:flex;justify-content:space-between;align-items:center;position:relative;z-index:2;margin-bottom:20px}
  .hero-logo{font-family:'Playfair Display',serif;font-size:1.35rem;color:#fff;display:flex;align-items:center;gap:6px}
  .weather-chip{background:rgba(255,255,255,.15);backdrop-filter:blur(8px);color:#fff;padding:6px 13px;border-radius:30px;font-size:.73rem;font-weight:600;display:flex;align-items:center;gap:5px;border:1px solid rgba(255,255,255,.2);cursor:pointer}
  .hero-body{position:relative;z-index:2}
  .hero-eyebrow{display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,.18);backdrop-filter:blur(6px);color:rgba(255,255,255,.95);font-size:.68rem;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;padding:4px 12px;border-radius:20px;margin-bottom:12px;border:1px solid rgba(255,255,255,.22)}
  .hero-title{font-family:'Playfair Display',serif;font-size:2.1rem;color:#fff;line-height:1.12;text-shadow:0 2px 20px rgba(0,0,0,.25);margin-bottom:8px}
  .hero-sub{color:rgba(255,255,255,.85);font-size:.82rem;line-height:1.65;font-weight:500}

  /* WEATHER WIDGET */
  .weather-widget{margin:0 16px;margin-top:-26px;position:relative;z-index:10;background:#fff;border-radius:var(--r);padding:14px 16px;box-shadow:0 8px 32px rgba(0,0,0,.12);display:flex;align-items:center;gap:14px}
  .ww-icon{font-size:2.2rem;flex-shrink:0}
  .ww-main{flex:1}
  .ww-temp{font-family:'Playfair Display',serif;font-size:1.8rem;color:var(--p);line-height:1}
  .ww-desc{font-size:.78rem;font-weight:600;color:var(--dark);margin-top:2px}
  .ww-loc{font-size:.67rem;color:var(--muted)}
  .ww-pills{display:flex;gap:8px}
  .wpill{text-align:center;background:var(--sand);border-radius:10px;padding:6px 10px}
  .wpill-v{font-size:.78rem;font-weight:700;color:var(--p)}
  .wpill-l{font-size:.6rem;color:var(--muted);margin-top:1px}

  /* BEAUTY CARD */
  .beauty-wrap{padding:18px 16px 0}
  .beauty-card{border-radius:var(--r);padding:20px;background:linear-gradient(145deg,#064e3b,#0a7c6e 50%,#0c8a9f);color:#fff;position:relative;overflow:hidden}
  .beauty-card::after{content:'🌊🌴';position:absolute;right:-8px;bottom:-14px;font-size:4rem;opacity:.14;letter-spacing:-4px}
  .beauty-head{font-family:'Playfair Display',serif;font-size:1.15rem;margin-bottom:8px}
  .beauty-body{font-size:.79rem;line-height:1.75;opacity:.92}
  .beauty-chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:12px}
  .bchip{background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.25);color:#fff;font-size:.67rem;font-weight:600;padding:3px 11px;border-radius:20px}

  /* SEARCH */
  .search-wrap{padding:16px 16px 0;position:relative;z-index:40}
  .search-box{display:flex;align-items:center;gap:10px;background:#fff;border-radius:50px;padding:11px 18px;box-shadow:0 4px 20px rgba(0,0,0,.1);border:2px solid transparent;transition:border-color .2s}
  .search-box:focus-within{border-color:var(--p)}
  .search-box input{border:none;outline:none;flex:1;font-family:'DM Sans',sans-serif;font-size:.88rem;color:var(--dark);background:transparent}
  .search-box input::placeholder{color:#c4bfb8}
  .srch-clear{cursor:pointer;color:#bbb;font-size:.85rem;display:none;padding:2px 4px}
  .search-drop{display:none;position:absolute;top:calc(100% - 4px);left:16px;right:16px;background:#fff;border-radius:16px;box-shadow:0 10px 40px rgba(0,0,0,.15);overflow:hidden;max-height:300px;overflow-y:auto}
  .search-drop.open{display:block}
  .sitem{display:flex;align-items:center;gap:12px;padding:11px 16px;cursor:pointer;border-bottom:1px solid #f5f0ea;transition:background .15s}
  .sitem:last-child{border:none}
  .sitem:active,.sitem:hover{background:#fafaf8}
  .sitem-ico{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1.15rem;flex-shrink:0}
  .sitem-name{font-size:.85rem;font-weight:600}
  .sitem-cat{font-size:.68rem;color:var(--muted);margin-top:1px}
  .snone{padding:18px;text-align:center;font-size:.8rem;color:var(--muted)}

  /* TRENDING */
  .sh{display:flex;justify-content:space-between;align-items:center;padding:18px 16px 10px}
  .sh h2{font-family:'Playfair Display',serif;font-size:1.1rem}
  .sh-sub{font-size:.72rem;color:var(--muted);margin-top:2px}
  .trend-outer{padding:0 16px}
  .trend-wrap{border-radius:var(--r);overflow:hidden;position:relative}
  .trend-rail{display:flex;transition:transform .55s cubic-bezier(.4,0,.2,1)}
  .tslide{flex-shrink:0;width:100%;height:210px;position:relative;cursor:pointer;overflow:hidden}
  .tslide img{width:100%;height:100%;object-fit:cover;position:absolute;inset:0}
  .tslide-bg{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:5rem}
  .tslide-ov{position:absolute;inset:0;background:linear-gradient(transparent 35%,rgba(0,0,0,.72))}
  .tslide-info{position:absolute;bottom:14px;left:16px;right:16px;color:#fff}
  .tslide-name{font-family:'Playfair Display',serif;font-size:1.1rem;text-shadow:0 1px 8px rgba(0,0,0,.4)}
  .tslide-cat{font-size:.7rem;opacity:.85;margin-top:2px}
  .tdots{display:flex;justify-content:center;gap:5px;margin-top:8px}
  .tdot{width:6px;height:6px;border-radius:50%;background:#d1ccc4;border:none;cursor:pointer;padding:0;transition:all .3s}
  .tdot.on{background:var(--p);width:20px;border-radius:3px}

  /* NEARBY */
  .nscroll{display:flex;gap:12px;padding:0 16px;overflow-x:auto;scrollbar-width:none;padding-bottom:4px}
  .nscroll::-webkit-scrollbar{display:none}
  .ncard{flex-shrink:0;width:150px;background:#fff;border-radius:var(--r2);overflow:hidden;box-shadow:0 3px 14px rgba(0,0,0,.08);cursor:pointer;transition:transform .15s}
  .ncard:active{transform:scale(.97)}
  .ncard-img{height:95px;display:flex;align-items:center;justify-content:center;font-size:2.5rem;position:relative;overflow:hidden}
  .ncard-img img{width:100%;height:100%;object-fit:cover;position:absolute;inset:0}
  .ncard-body{padding:9px 11px 12px}
  .ncard-name{font-family:'Playfair Display',serif;font-size:.85rem;line-height:1.2}
  .ncard-dist{font-size:.68rem;color:var(--p);font-weight:600;margin-top:3px}
  .ncard-desc{font-size:.65rem;color:var(--muted);margin-top:2px}

  /* TABS */
  .tabs-wrap{padding:18px 16px 0;overflow-x:auto;scrollbar-width:none}
  .tabs-wrap::-webkit-scrollbar{display:none}
  .tabs{display:flex;gap:8px}
  .tab{flex-shrink:0;border:none;cursor:pointer;padding:9px 17px;border-radius:50px;font-family:'DM Sans',sans-serif;font-size:.78rem;font-weight:600;background:#fff;color:var(--muted);box-shadow:0 2px 8px rgba(0,0,0,.07);transition:all .25s}
  .tab.active{color:#fff;box-shadow:0 4px 16px rgba(0,0,0,.18)}
  .tab[data-tab="attractions"].active{background:var(--g1)}
  .tab[data-tab="events"].active{background:var(--g3)}
  .tab[data-tab="stay"].active{background:var(--g4)}
  .tab[data-tab="food"].active{background:var(--g2)}
  .tab[data-tab="transport"].active{background:var(--g5)}
  .tab[data-tab="emergency"].active{background:var(--g6)}

  /* SECTIONS */
  .sec{display:none;padding:8px 0 130px;animation:fu .3s ease}
  .sec.active{display:block}
  @keyframes fu{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

  /* SEC BANNER */
  .sbanner{margin:12px 16px;border-radius:var(--r);padding:16px 18px;color:#fff;position:relative;overflow:hidden}
  .sbanner h2{font-family:'Playfair Display',serif;font-size:1.1rem}
  .sbanner p{font-size:.76rem;opacity:.9;margin-top:3px}
  .sbanner .deco{position:absolute;right:10px;bottom:-14px;font-size:3.8rem;opacity:.2}

  /* SUB TABS */
  .stabs{display:flex;gap:7px;padding:8px 16px;overflow-x:auto;scrollbar-width:none;margin-bottom:6px}
  .stabs::-webkit-scrollbar{display:none}
  .stab{flex-shrink:0;border:2px solid var(--bdr);cursor:pointer;padding:5px 13px;border-radius:25px;font-family:'DM Sans',sans-serif;font-size:.72rem;font-weight:600;background:#fff;color:var(--muted);transition:all .2s}
  .stab.active{background:var(--p);color:#fff;border-color:var(--p)}

  /* PLACE GRID */
  .pgrid{display:grid;grid-template-columns:1fr 1fr;gap:11px;padding:0 16px}
  .pcard{background:#fff;border-radius:var(--r);overflow:hidden;box-shadow:0 3px 14px rgba(0,0,0,.08);cursor:pointer;transition:transform .15s}
  .pcard:active{transform:scale(.97)}
  .pcard-img{height:115px;position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:2.8rem}
  .pcard-img img{width:100%;height:100%;object-fit:cover;position:absolute;inset:0}
  .pcard-bdg{position:absolute;top:7px;right:7px;background:rgba(0,0,0,.45);backdrop-filter:blur(4px);color:#fff;font-size:.58rem;font-weight:700;padding:2px 7px;border-radius:8px}
  .pcard-body{padding:9px 11px 11px}
  .pcard-name{font-family:'Playfair Display',serif;font-size:.9rem;line-height:1.2}
  .pcard-stars{font-size:.7rem;color:var(--gold);margin-top:2px}
  .pcard-sub{font-size:.65rem;color:var(--muted);margin-top:2px}

  /* LIST CARD */
  .lcard{background:#fff;border-radius:var(--r);margin:0 16px 12px;overflow:hidden;box-shadow:0 3px 14px rgba(0,0,0,.07);cursor:pointer;transition:transform .15s}
  .lcard:active{transform:scale(.99)}
  .lcard-img{height:138px;display:flex;align-items:center;justify-content:center;font-size:3.5rem;position:relative;overflow:hidden}
  .lcard-img img{width:100%;height:100%;object-fit:cover;position:absolute;inset:0}
  .lcard-body{padding:12px 14px 14px}
  .lcard-row{display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
  .lcard-name{font-family:'Playfair Display',serif;font-size:1rem}
  .lcard-price{font-family:'Playfair Display',serif;font-size:1.1rem;color:var(--p);white-space:nowrap}
  .lcard-price small{font-size:.68rem;color:#aaa;font-family:'DM Sans',sans-serif}
  .lcard-stars{font-size:.78rem;color:var(--gold);margin-top:2px}
  .lcard-desc{font-size:.77rem;color:var(--muted);margin-top:5px;line-height:1.6}
  .lcard-addr{font-size:.72rem;color:var(--muted);margin-top:4px}
  .chip-row{display:flex;flex-wrap:wrap;gap:5px;margin-top:8px}
  .chip{font-size:.63rem;font-weight:600;padding:3px 9px;border-radius:8px}

  /* EVENT CARD */
  .ecard{display:flex;align-items:center;gap:13px;background:#fff;border-radius:var(--r);padding:14px;margin:0 16px 11px;box-shadow:0 3px 12px rgba(0,0,0,.07);cursor:pointer;transition:transform .15s}
  .ecard:active{transform:scale(.99)}
  .edate{flex-shrink:0;width:52px;height:58px;border-radius:12px;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#fff}
  .edate-d{font-family:'Playfair Display',serif;font-size:1.5rem;line-height:1}
  .edate-m{font-size:.58rem;font-weight:700;text-transform:uppercase;opacity:.9}
  .einfo-name{font-family:'Playfair Display',serif;font-size:.93rem}
  .einfo-meta{font-size:.7rem;color:var(--muted);margin-top:3px;line-height:1.5}
  .etag{display:inline-block;margin-top:5px;font-size:.62rem;font-weight:700;padding:2px 9px;border-radius:8px;color:#fff}

  /* TRANSPORT */
  .tpage{padding:0 16px}
  .tcat-hd{display:flex;align-items:center;gap:8px;font-family:'Playfair Display',serif;font-size:1rem;margin:16px 0 10px}
  .tcat-hd span{font-size:1.3rem}
  .tcard{background:#fff;border-radius:var(--r2);padding:14px;margin-bottom:10px;box-shadow:0 2px 10px rgba(0,0,0,.06)}
  .tcard-name{font-weight:700;font-size:.88rem}
  .tcard-info{font-size:.74rem;color:var(--muted);margin-top:3px;line-height:1.6}
  .tcard-bdg{display:inline-block;margin-top:6px;font-size:.62rem;font-weight:700;padding:2px 9px;border-radius:8px;color:#fff}
  .tcall{background:var(--p);color:#fff;border:none;border-radius:18px;padding:5px 14px;font-size:.72rem;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;margin-top:8px}
  .tempty{font-size:.8rem;color:var(--muted);font-style:italic;padding:4px 0}

  /* EMERGENCY */
  .epage{padding:0 16px}
  .emcard{display:flex;align-items:center;gap:14px;background:#fff;border-radius:var(--r);padding:15px;margin-bottom:11px;box-shadow:0 3px 12px rgba(0,0,0,.07)}
  .emico{width:50px;height:50px;border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:1.5rem;flex-shrink:0}
  .eminfo{flex:1}
  .emname{font-weight:700;font-size:.9rem}
  .emnum{font-family:'Playfair Display',serif;font-size:1.25rem;color:var(--p);margin-top:1px}
  .emsub{font-size:.68rem;color:var(--muted);margin-top:2px}
  .emcall{background:var(--p);color:#fff;border:none;border-radius:20px;padding:7px 16px;font-size:.75rem;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;flex-shrink:0}

  /* BOTTOM NAV */
  .bnav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:#fff;border-top:1px solid var(--bdr);display:flex;z-index:100;box-shadow:0 -4px 20px rgba(0,0,0,.08);padding-bottom:env(safe-area-inset-bottom)}
  .nbtn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px 2px 11px;gap:2px;cursor:pointer;border:none;background:transparent;font-family:'DM Sans',sans-serif;font-size:.54rem;font-weight:700;color:#bbb;transition:color .2s;min-width:0}
  .nbtn .ico{font-size:1.15rem;transition:transform .2s}
  .nbtn.active{color:var(--p)}
  .nbtn.active .ico{transform:scale(1.2)}

  /* DETAIL PAGE */
  #dp{display:none;position:fixed;inset:0;background:var(--sand);z-index:500;overflow-y:auto;max-width:430px;margin:0 auto}
  .dp-hero{height:265px;position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:5rem}
  .dp-hero img{width:100%;height:100%;object-fit:cover;position:absolute;inset:0}
  .dp-ov{position:absolute;inset:0;background:linear-gradient(transparent 38%,rgba(10,20,40,.82))}
  .dp-name{position:absolute;bottom:14px;left:16px;right:16px;font-family:'Playfair Display',serif;font-size:1.45rem;color:#fff;line-height:1.2;text-shadow:0 2px 12px rgba(0,0,0,.5)}
  .dp-back{position:absolute;top:16px;left:16px;background:rgba(0,0,0,.38);backdrop-filter:blur(8px);border:none;color:#fff;padding:7px 15px;border-radius:25px;font-family:'DM Sans',sans-serif;font-size:.78rem;font-weight:600;cursor:pointer;z-index:2}
  .dp-body{padding:14px 16px 110px}
  .dp-stars{color:var(--gold);font-size:1.05rem}
  .dp-rat{font-size:.78rem;color:var(--muted)}
  .dp-bdg{display:inline-block;font-size:.68rem;font-weight:700;padding:3px 13px;border-radius:20px;margin:8px 0 12px}
  .dp-h{font-family:'Playfair Display',serif;font-size:1rem;margin:16px 0 7px;padding-bottom:5px;border-bottom:2px solid var(--bdr)}
  .dp-about{font-size:.84rem;line-height:1.8}
  .igrid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin:8px 0}
  .iitem{background:#fff;border-radius:11px;padding:10px 12px;box-shadow:0 2px 8px rgba(0,0,0,.05)}
  .iitem-l{font-size:.62rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.4px}
  .iitem-v{font-family:'Playfair Display',serif;font-size:.9rem;margin-top:3px}
  .tipbox{background:linear-gradient(135deg,#fff7ed,#ffedd5);border-radius:12px;padding:12px 14px;margin:8px 0;border-left:4px solid var(--acc)}
  .tipbox p{font-size:.78rem;color:#78350f;line-height:1.7}
  .mwrap{border-radius:13px;overflow:hidden;height:172px;background:#e0f2f1;margin:8px 0}
  .mwrap iframe{width:100%;height:100%;border:none}
  .discbox{background:#fff5f5;border-radius:11px;padding:11px 13px;border-left:3px solid #fca5a5;margin-top:8px}
  .discbox p{font-size:.72rem;color:#7f1d1d;line-height:1.7}
  .dp-actions{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:#fff;border-top:1px solid var(--bdr);padding:10px 16px;display:flex;gap:8px;box-shadow:0 -4px 20px rgba(0,0,0,.08);z-index:100;padding-bottom:calc(10px + env(safe-area-inset-bottom))}
  .abtn{flex:1;text-align:center;padding:10px;border-radius:25px;font-size:.78rem;font-weight:700;color:#fff;border:none;cursor:pointer;font-family:'DM Sans',sans-serif}

  /* FOOTER */
  .footer{background:var(--dark);color:#fff;padding:28px 18px 20px;margin-top:12px}
  .ft-logo{font-family:'Playfair Display',serif;font-size:1.2rem;margin-bottom:3px}
  .ft-tag{font-size:.72rem;color:#475569;margin-bottom:18px}
  .ft-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:18px}
  .ft-btn{background:rgba(255,255,255,.05);color:#94a3b8;border:1px solid rgba(255,255,255,.08);border-radius:10px;padding:10px 12px;font-size:.72rem;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;text-align:left;display:flex;align-items:center;gap:7px;transition:background .2s}
  .ft-btn:hover,.ft-btn:active{background:rgba(255,255,255,.1);color:#fff}
