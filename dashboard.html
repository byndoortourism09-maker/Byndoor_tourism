<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Admin — Discover Byndoor</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
  :root{--p:#0a7c6e;--acc:#f97316;--dark:#0f172a;--muted:#64748b;--bdr:#e8e4de;--bg:#f8f9ff;--r:16px}
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--dark);min-height:100vh}
  .topbar{background:linear-gradient(135deg,#0a7c6e,#0ea5e9);padding:14px 18px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 4px 20px rgba(0,0,0,.15)}
  .tb-logo{font-family:'Playfair Display',serif;font-size:1.2rem;color:#fff}
  .tb-right{display:flex;gap:10px;align-items:center}
  .tb-user{background:rgba(255,255,255,.2);color:#fff;padding:4px 13px;border-radius:20px;font-size:.75rem;font-weight:600;max-width:150px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .tb-out{background:rgba(255,255,255,.15);color:#fff;border:1px solid rgba(255,255,255,.3);padding:4px 13px;border-radius:20px;font-size:.75rem;cursor:pointer;font-family:'DM Sans',sans-serif}
  .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;padding:14px;max-width:960px;margin:0 auto}
  .stat{background:#fff;border-radius:var(--r);padding:13px;text-align:center;box-shadow:0 2px 10px rgba(0,0,0,.06)}
  .stat-n{font-family:'Playfair Display',serif;font-size:1.5rem}
  .stat-l{font-size:.68rem;color:var(--muted);font-weight:600;margin-top:2px}
  .wrap{max-width:960px;margin:0 auto;padding:0 14px 100px}
  .sec-hd{display:flex;justify-content:space-between;align-items:center;margin:18px 0 10px}
  .sec-hd h2{font-family:'Playfair Display',serif;font-size:1.1rem}

  /* CATEGORY PILLS */
  .cat-pills{display:flex;gap:8px;overflow-x:auto;scrollbar-width:none;margin-bottom:12px}
  .cat-pills::-webkit-scrollbar{display:none}
  .cpill{flex-shrink:0;border:2px solid var(--bdr);cursor:pointer;padding:7px 16px;border-radius:25px;font-size:.76rem;font-weight:600;background:#fff;color:var(--muted);transition:all .2s;font-family:'DM Sans',sans-serif}
  .cpill.active{background:var(--p);color:#fff;border-color:var(--p)}

  /* ADD BUTTON */
  .add-btn{background:var(--acc);color:#fff;border:none;border-radius:25px;padding:8px 18px;font-size:.8rem;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;display:flex;align-items:center;gap:6px}

  /* PLACE ROWS */
  .place-row{background:#fff;border-radius:var(--r);margin-bottom:9px;display:flex;align-items:center;gap:11px;padding:11px 13px;box-shadow:0 2px 10px rgba(0,0,0,.06)}
  .pr-thumb{width:52px;height:52px;border-radius:11px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:1.5rem;overflow:hidden}
  .pr-thumb img{width:100%;height:100%;object-fit:cover}
  .pr-info{flex:1;min-width:0}
  .pr-name{font-weight:700;font-size:.9rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .pr-sub{font-size:.7rem;color:var(--muted);margin-top:2px}
  .pr-acts{display:flex;gap:6px;flex-shrink:0}
  .ico-btn{width:33px;height:33px;border:none;border-radius:9px;cursor:pointer;font-size:.85rem;display:flex;align-items:center;justify-content:center}
  .btn-e{background:#E3F2FD;color:#1565C0}
  .btn-d{background:#FFEBEE;color:#C62828}

  /* MODAL */
  .modal-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;overflow-y:auto;padding:20px;align-items:flex-start;justify-content:center}
  .modal-ov.open{display:flex}
  .modal{background:#fff;border-radius:20px;width:100%;max-width:580px;padding:22px;box-shadow:0 20px 60px rgba(0,0,0,.25);margin:auto}
  .modal-hd{font-family:'Playfair Display',serif;font-size:1.2rem;margin-bottom:16px;display:flex;justify-content:space-between;align-items:center}
  .modal-x{background:none;border:none;font-size:1.3rem;cursor:pointer;color:#999}

  /* FORM TABS */
  .ftabs{display:flex;gap:6px;margin-bottom:18px;flex-wrap:wrap}
  .ftab{border:2px solid var(--bdr);cursor:pointer;padding:7px 14px;border-radius:25px;font-size:.74rem;font-weight:600;background:#fff;color:var(--muted);transition:all .2s;font-family:'DM Sans',sans-serif}
  .ftab.active{background:var(--p);color:#fff;border-color:var(--p)}

  /* FORM PANELS */
  .fpanel{display:none}
  .fpanel.active{display:block}
  .fg{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .fc{grid-column:1/-1}
  .fl{display:flex;flex-direction:column;gap:4px;margin-bottom:2px}
  .fl label{font-size:.74rem;font-weight:600;color:#555}
  .fi{border:2px solid var(--bdr);border-radius:9px;padding:9px 12px;font-family:'DM Sans',sans-serif;font-size:.83rem;outline:none;width:100%;background:#fff;color:var(--dark);transition:border .2s}
  .fi:focus{border-color:var(--p)}
  textarea.fi{min-height:80px;resize:vertical}

  /* PHOTO */
  .photo-area{border:2px dashed var(--bdr);border-radius:11px;padding:18px;text-align:center;cursor:pointer;position:relative;overflow:hidden;transition:border .2s}
  .photo-area:hover{border-color:var(--p)}
  .photo-area input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
  .ph-prev{width:100%;height:150px;object-fit:cover;border-radius:9px;display:none;margin-top:10px}
  .upload-wrap{display:none;margin-top:8px}
  .upload-bar-bg{background:#f0f0f0;border-radius:6px;height:5px;overflow:hidden}
  .upload-bar{height:100%;background:var(--p);width:0%;border-radius:6px;transition:width .3s}
  .upload-st{font-size:.72rem;color:var(--muted);margin-top:4px;min-height:16px}
  .notice{background:#E8F5E9;border-radius:9px;padding:7px 11px;font-size:.7rem;color:#2E7D32;margin-top:6px;border-left:3px solid #4CAF50}

  /* COLOR ROW */
  .cswatches{display:flex;gap:7px;flex-wrap:wrap;margin-top:4px}
  .cswatch{width:30px;height:30px;border-radius:50%;cursor:pointer;border:3px solid transparent;transition:transform .15s}
  .cswatch.on{border-color:var(--dark);transform:scale(1.15)}

  /* FORM ACTIONS */
  .f-acts{display:flex;gap:10px;margin-top:18px;justify-content:flex-end}
  .f-cancel{background:#f0ede8;color:var(--dark);border:none;border-radius:11px;padding:10px 22px;font-size:.83rem;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif}
  .f-save{background:var(--p);color:#fff;border:none;border-radius:11px;padding:10px 22px;font-size:.83rem;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;display:flex;align-items:center;gap:6px}
  .spinner{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}

  /* CONFIRM */
  .conf-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:300;align-items:center;justify-content:center;padding:20px}
  .conf-ov.open{display:flex}
  .conf-box{background:#fff;border-radius:18px;padding:22px;max-width:300px;width:100%;text-align:center}
  .conf-box h3{font-family:'Playfair Display',serif;font-size:1.1rem;margin-bottom:7px}
  .conf-box p{font-size:.82rem;color:var(--muted);margin-bottom:18px}
  .conf-btns{display:flex;gap:10px}
  .conf-btns button{flex:1;padding:10px;border:none;border-radius:11px;font-family:'DM Sans',sans-serif;font-size:.83rem;font-weight:700;cursor:pointer}
  .conf-no{background:#f0ede8;color:var(--dark)}
  .conf-yes{background:#C62828;color:#fff}

  .loading{display:flex;align-items:center;justify-content:center;padding:36px;gap:10px;color:var(--muted)}
  .loading .spinner{border-color:#f0ede8;border-top-color:var(--p)}
  .empty-st{text-align:center;padding:36px;color:var(--muted);font-size:.82rem}
  @media(max-width:500px){.fg{grid-template-columns:1fr}.fc{grid-column:1}.stats{grid-template-columns:1fr 1fr}}
  </style>
</head>
<body>

<div class="topbar">
  <div class="tb-logo">🌊 Byndoor Admin</div>
  <div class="tb-right">
    <div class="tb-user" id="tb-user">Admin</div>
    <button class="tb-out" onclick="doLogout()">Sign Out</button>
  </div>
</div>

<div class="stats">
  <div class="stat"><div class="stat-n" id="s-total" style="color:var(--acc)">0</div><div class="stat-l">Total</div></div>
  <div class="stat"><div class="stat-n" id="s-att" style="color:#0a7c6e">0</div><div class="stat-l">Attractions</div></div>
  <div class="stat"><div class="stat-n" id="s-stay" style="color:#7c3aed">0</div><div class="stat-l">Stay</div></div>
  <div class="stat"><div class="stat-n" id="s-food" style="color:var(--acc)">0</div><div class="stat-l">Food</div></div>
</div>

<div class="wrap">
  <div class="sec-hd">
    <h2>📍 Manage Places</h2>
    <button class="add-btn" onclick="openModal(null)">＋ Add Place</button>
  </div>
  <div class="cat-pills">
    <button class="cpill active" data-f="all">All</button>
    <button class="cpill" data-f="attractions">🏛️ Attractions</button>
    <button class="cpill" data-f="events">🎉 Events</button>
    <button class="cpill" data-f="stay">🏨 Stay</button>
    <button class="cpill" data-f="food">🍛 Food</button>
    <button class="cpill" data-f="transport">🚌 Transport</button>
  </div>
  <div id="places-list"><div class="loading"><div class="spinner"></div> Loading…</div></div>
</div>

<!-- MODAL -->
<div class="modal-ov" id="modal">
  <div class="modal">
    <div class="modal-hd"><span id="modal-title">Add Place</span><button class="modal-x" onclick="closeModal()">✕</button></div>

    <!-- FORM TYPE SELECTOR -->
    <div class="ftabs" id="ftabs">
      <button class="ftab active" data-form="attractions">🏛️ Attraction</button>
      <button class="ftab" data-form="events">🎉 Event</button>
      <button class="ftab" data-form="stay">🏨 Stay</button>
      <button class="ftab" data-form="food">🍛 Food</button>
      <button class="ftab" data-form="transport">🚌 Transport</button>
      <button class="ftab" data-form="nearby">🗺️ Nearby</button>
    </div>

    <!-- ATTRACTION FORM -->
    <div class="fpanel active" id="fp-attractions">
      <div class="fg">
        <div class="fl fc"><label>📸 Photo</label>
          <div class="photo-area"><div id="ph-att-ph"><div style="font-size:1.8rem">📷</div><div style="font-size:.78rem;color:#aaa;margin-top:5px">Tap to upload photo</div></div><input type="file" id="ph-att" accept="image/*" onchange="handlePhoto(this,'att')"/><img id="ph-att-prev" class="ph-prev"/></div>
          <div class="upload-wrap" id="uw-att"><div class="upload-bar-bg"><div class="upload-bar" id="ub-att"></div></div></div>
          <div class="upload-st" id="us-att"></div>
          <div class="notice">📤 Photos uploaded free via Cloudinary</div>
        </div>
        <div class="fl fc"><label>Place Name *</label><input class="fi" id="att-name" placeholder="e.g. Byndoor Beach"/></div>
        <div class="fl"><label>Sub-type *</label>
          <select class="fi" id="att-subtype">
            <option value="">Select…</option>
            <option value="beaches">🏖️ Beach</option>
            <option value="temples">🛕 Temple</option>
            <option value="waterfalls">💧 Waterfall / Lake</option>
            <option value="hills">⛰️ Hill</option>
            <option value="rivers">🌊 River Activity</option>
            <option value="sea-sports">🤿 Sea Sports</option>
            <option value="wildlife">🦋 Wildlife</option>
            <option value="historical">🏛️ Historical</option>
            <option value="cultural">🎭 Cultural</option>
            <option value="others">📍 Others</option>
          </select>
        </div>
        <div class="fl"><label>⭐ Rating (1–5)</label><input class="fi" type="number" id="att-rating" placeholder="5" min="1" max="5" step="0.1"/></div>
        <div class="fl fc"><label>About *</label><textarea class="fi" id="att-about" placeholder="Describe this attraction…"></textarea></div>
        <div class="fl"><label>⏰ Timing</label><input class="fi" id="att-timing" placeholder="e.g. 6am – 6pm"/></div>
        <div class="fl"><label>🎟️ Entry Fee</label><input class="fi" id="att-entry" placeholder="e.g. ₹50 or Free"/></div>
        <div class="fl"><label>🌤️ Best Time</label><input class="fi" id="att-best" placeholder="e.g. Oct – Mar"/></div>
        <div class="fl"><label>🚌 Transport from Byndoor Town</label><input class="fi" id="att-transport" placeholder="e.g. 5km by auto ₹50"/></div>
        <div class="fl"><label>⚠️ Risk / Restrictions</label><input class="fi" id="att-risk" placeholder="e.g. No swimming during monsoon"/></div>
        <div class="fl"><label>📍 Latitude</label><input class="fi" type="number" id="att-lat" placeholder="e.g. 13.8785" step="any"/></div>
        <div class="fl"><label>📍 Longitude</label><input class="fi" type="number" id="att-lng" placeholder="e.g. 74.7313" step="any"/></div>
        <div class="fl fc"><label>💡 Visitor Tips</label><textarea class="fi" id="att-tips" placeholder="Helpful tips…" style="min-height:60px"></textarea></div>
        <div class="fl fc"><label>🏷️ Tags (comma separated)</label><input class="fi" id="att-tags" placeholder="Beach, Sunset, Swimming, Family"/></div>
        <div class="fl"><label>Emoji</label><input class="fi" id="att-emoji" placeholder="🏖️"/></div>
        <div class="fl"><label>📏 Distance from Byndoor Town</label><input class="fi" id="att-distance" placeholder="e.g. 5 km from Byndoor town"/></div>
        <div class="fl fc"><label>▶ YouTube Link (optional)</label><input class="fi" id="att-youtube" placeholder="https://youtube.com/..."/></div>
        <div class="fl fc"><label>📸 Instagram Link (optional)</label><input class="fi" id="att-instagram" placeholder="https://instagram.com/..."/></div>
        <div class="fl fc"><label>📷 More Photos (upload multiple)</label>
          <input type="file" id="ph-att-extra" accept="image/*" multiple onchange="handleExtraPhotos(this,'att')" style="margin-top:6px"/>
          <div id="ph-att-extra-prev" style="display:flex;flex-wrap:wrap;gap:6px;margin-top:8px"></div>
        </div>
        <div class="fl fc" style="margin-top:4px">
          <label style="display:flex;align-items:center;gap:10px;cursor:pointer;font-size:.82rem;font-weight:600;color:#555">
            <input type="checkbox" id="att-nearby" style="width:18px;height:18px;accent-color:var(--p);cursor:pointer"/>
            🗺️ Show in "Byndoor Taluk Highlights" section on home page
          </label>
        </div>
        <div class="fl fc"><label>🎨 Card Color</label><div class="cswatches" id="cs-att"></div><input type="hidden" id="att-bg"/></div>
      </div>
    </div>

    <!-- EVENT FORM -->
    <div class="fpanel" id="fp-events">
      <div class="fg">
        <div class="fl fc"><label>📸 Event Photo</label>
          <div class="photo-area"><div id="ph-evt-ph"><div style="font-size:1.8rem">📷</div><div style="font-size:.78rem;color:#aaa;margin-top:5px">Tap to upload</div></div><input type="file" id="ph-evt" accept="image/*" onchange="handlePhoto(this,'evt')"/><img id="ph-evt-prev" class="ph-prev"/></div>
          <div class="upload-wrap" id="uw-evt"><div class="upload-bar-bg"><div class="upload-bar" id="ub-evt"></div></div></div>
          <div class="upload-st" id="us-evt"></div>
        </div>
        <div class="fl fc"><label>Event Name *</label><input class="fi" id="evt-name" placeholder="e.g. Byndoor Beach Festival"/></div>
        <div class="fl"><label>📅 Event Date</label><input class="fi" type="date" id="evt-date"/></div>
        <div class="fl"><label>🕐 Time</label><input class="fi" id="evt-time" placeholder="e.g. 5:00 PM onwards"/></div>
        <div class="fl fc"><label>📍 Place / Venue</label><input class="fi" id="evt-location" placeholder="e.g. Byndoor Beach, Main Ground"/></div>
        <div class="fl"><label>🎟️ Entry Fee</label><input class="fi" id="evt-entry" placeholder="e.g. Free or ₹100"/></div>
        <div class="fl"><label>Type</label>
          <select class="fi" id="evt-subtype">
            <option value="">Select…</option>
            <option>Festival</option><option>Cultural Night</option><option>Sports</option>
            <option>Religious</option><option>Beach Event</option><option>Others</option>
          </select>
        </div>
        <div class="fl fc"><label>About the Event</label><textarea class="fi" id="evt-about" placeholder="Brief description…"></textarea></div>
        <div class="fl fc"><label>🎨 Card Color</label><div class="cswatches" id="cs-evt"></div><input type="hidden" id="evt-bg"/></div>
      </div>
    </div>

    <!-- STAY FORM -->
    <div class="fpanel" id="fp-stay">
      <div class="fg">
        <div class="fl fc"><label>📸 Photo</label>
          <div class="photo-area"><div id="ph-stay-ph"><div style="font-size:1.8rem">📷</div><div style="font-size:.78rem;color:#aaa;margin-top:5px">Tap to upload</div></div><input type="file" id="ph-stay" accept="image/*" onchange="handlePhoto(this,'stay')"/><img id="ph-stay-prev" class="ph-prev"/></div>
          <div class="upload-wrap" id="uw-stay"><div class="upload-bar-bg"><div class="upload-bar" id="ub-stay"></div></div></div>
          <div class="upload-st" id="us-stay"></div>
        </div>
        <div class="fl fc"><label>Name *</label><input class="fi" id="stay-name" placeholder="e.g. Coastal Breeze Resort"/></div>
        <div class="fl fc"><label>📍 Address</label><input class="fi" id="stay-address" placeholder="e.g. Near Byndoor Beach, NH 66"/></div>
        <div class="fl"><label>Type</label>
          <select class="fi" id="stay-subtype">
            <option value="">Select…</option>
            <option>Hotel</option><option>Resort</option><option>Homestay</option>
            <option>Guest House</option><option>Camp</option><option>Lodge</option>
          </select>
        </div>
        <div class="fl"><label>💰 Price (₹/night)</label><input class="fi" id="stay-price" placeholder="e.g. 1500"/></div>
        <div class="fl"><label>📞 Phone</label><input class="fi" type="tel" id="stay-phone" placeholder="+91 98000 00000"/></div>
        <div class="fl"><label>⭐ Rating</label><input class="fi" type="number" id="stay-rating" placeholder="4" min="1" max="5" step="0.1"/></div>
        <div class="fl fc"><label>About</label><textarea class="fi" id="stay-about" placeholder="Brief description…"></textarea></div>
        <div class="fl fc"><label>🛎️ Facilities (comma separated)</label><input class="fi" id="stay-facilities" placeholder="WiFi, AC, Parking, Restaurant, Pool"/></div>
        <div class="fl"><label>📍 Latitude</label><input class="fi" type="number" id="stay-lat" placeholder="13.8785" step="any"/></div>
        <div class="fl"><label>📍 Longitude</label><input class="fi" type="number" id="stay-lng" placeholder="74.7313" step="any"/></div>
        <div class="fl fc"><label>▶ YouTube Link (optional)</label><input class="fi" id="stay-youtube" placeholder="https://youtube.com/..."/></div>
        <div class="fl fc"><label>📸 Instagram Link (optional)</label><input class="fi" id="stay-instagram" placeholder="https://instagram.com/..."/></div>
        <div class="fl fc"><label>📷 More Photos (upload multiple)</label>
          <input type="file" id="ph-stay-extra" accept="image/*" multiple onchange="handleExtraPhotos(this,'stay')" style="margin-top:6px"/>
          <div id="ph-stay-extra-prev" style="display:flex;flex-wrap:wrap;gap:6px;margin-top:8px"></div>
        </div>
        <div class="fl fc"><label>🎨 Card Color</label><div class="cswatches" id="cs-stay"></div><input type="hidden" id="stay-bg"/></div>
      </div>
    </div>

    <!-- FOOD FORM -->
    <div class="fpanel" id="fp-food">
      <div class="fg">
        <div class="fl fc"><label>📸 Photo</label>
          <div class="photo-area"><div id="ph-food-ph"><div style="font-size:1.8rem">📷</div><div style="font-size:.78rem;color:#aaa;margin-top:5px">Tap to upload</div></div
